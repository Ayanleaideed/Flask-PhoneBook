<!DOCTYPE html>
<html>

<head>
    <title>Search Results</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            text-align: left;
            padding: 8px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <h1>Search Results</h1>
    {% if rows %}
    <table>
        <tr>
            <th>Name</th>
            <th>Phone</th>
        </tr>
        {% for row in rows %}
        <tr>
            <td>{{ row.name }}</td>
            <td>{{ row.phone }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No entries found.</p>
    {% endif %}
</body>

</html>
