<!DOCTYPE html>
<html>

<head>
    <title>Button Example</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>

<body>

    <div class="container">

        <form action="{{ url_for('add_entry') }}" method="post">
            <button class="button" name="add_btn" value="true" type="submit">Add</button>


            <button class="button" onclick="alert('Delete button clicked')">Delete</button>
            <button class="button" onclick="alert('Search button clicked')">Search</button>
            <button class="button" onclick="alert('Edit button clicked')">Edit</button>
        </form>
    </div>
</body>

</html>
